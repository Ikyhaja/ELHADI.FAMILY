<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Shooter</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
}

#ui span{
margin-right:20px;
}

</style>

</head>
<body>

<div id="ui">
<span id="score">Score: 0</span>
<span id="health">Health: 100</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let score = 0
let health = 100

const scoreUI = document.getElementById("score")
const healthUI = document.getElementById("health")

// scene
const scene = new THREE.Scene()

// camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 6

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)


// ===== LIGHT =====
const light = new THREE.PointLight(0xffffff,1)
light.position.set(5,5,5)
scene.add(light)


// ===== GALAXY =====
const starGeo = new THREE.BufferGeometry()
const starCount = 5000
const starPos = new Float32Array(starCount*3)

for(let i=0;i<starCount*3;i++){
starPos[i]=(Math.random()-0.5)*200
}

starGeo.setAttribute(
"position",
new THREE.BufferAttribute(starPos,3)
)

const starMat = new THREE.PointsMaterial({
color:0xffffff,
size:0.2
})

const stars = new THREE.Points(starGeo,starMat)
scene.add(stars)


// ===== PLANET =====
const planetGeo = new THREE.SphereGeometry(2,32,32)
const planetMat = new THREE.MeshStandardMaterial({color:0x2244ff})

const planet = new THREE.Mesh(planetGeo,planetMat)
planet.position.set(10,0,-30)
scene.add(planet)


// ===== PLAYER =====
const shipGeo = new THREE.ConeGeometry(0.4,1,32)
const shipMat = new THREE.MeshStandardMaterial({color:0xff4444})

const ship = new THREE.Mesh(shipGeo,shipMat)

ship.rotation.x = Math.PI/2
scene.add(ship)


// ===== LASER =====
const lasers = []

function shoot(){

const geo = new THREE.CylinderGeometry(0.05,0.05,2)
const mat = new THREE.MeshBasicMaterial({color:0x00ff00})

const laser = new THREE.Mesh(geo,mat)

laser.rotation.x = Math.PI/2
laser.position.copy(ship.position)

scene.add(laser)
lasers.push(laser)

}

window.addEventListener("click",shoot)
window.addEventListener("touchstart",shoot)


// ===== METEOR =====
const meteors = []

function spawnMeteor(){

const geo = new THREE.DodecahedronGeometry(0.6)
const mat = new THREE.MeshStandardMaterial({color:0x888888})

const meteor = new THREE.Mesh(geo,mat)

meteor.position.x = (Math.random()-0.5)*10
meteor.position.y = (Math.random()-0.5)*6
meteor.position.z = -40

scene.add(meteor)

meteors.push(meteor)

}

setInterval(spawnMeteor,1200)


// ===== CONTROL =====
window.addEventListener("mousemove",(e)=>{

ship.position.x = (e.clientX/window.innerWidth-0.5)*10
ship.position.y = -(e.clientY/window.innerHeight-0.5)*6

})

window.addEventListener("touchmove",(e)=>{

let t = e.touches[0]

ship.position.x = (t.clientX/window.innerWidth-0.5)*10
ship.position.y = -(t.clientY/window.innerHeight-0.5)*6

})


// ===== EXPLOSION =====
function explode(x,y,z){

const geo = new THREE.SphereGeometry(0.3,16,16)
const mat = new THREE.MeshBasicMaterial({color:0xffaa00})

const boom = new THREE.Mesh(geo,mat)

boom.position.set(x,y,z)

scene.add(boom)

setTimeout(()=>{
scene.remove(boom)
},200)

}


// ===== ANIMATION =====
function animate(){

requestAnimationFrame(animate)

stars.rotation.y += 0.0005
planet.rotation.y += 0.005


// laser move
lasers.forEach(l=>{
l.position.z -= 1
})


// meteor move
meteors.forEach((m,i)=>{

m.position.z += 0.2

// collision ship
if(
Math.abs(m.position.x-ship.position.x)<0.8 &&
Math.abs(m.position.y-ship.position.y)<0.8 &&
Math.abs(m.position.z-ship.position.z)<0.8
){

health -= 10
healthUI.innerText = "Health: "+health

scene.remove(m)
meteors.splice(i,1)

}

lasers.forEach((l,li)=>{

if(
Math.abs(m.position.x-l.position.x)<0.6 &&
Math.abs(m.position.y-l.position.y)<0.6 &&
Math.abs(m.position.z-l.position.z)<0.6
){

explode(m.position.x,m.position.y,m.position.z)

score += 10
scoreUI.innerText = "Score: "+score

scene.remove(m)
scene.remove(l)

meteors.splice(i,1)
lasers.splice(li,1)

}

})

})

renderer.render(scene,camera)

}

animate()


window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
