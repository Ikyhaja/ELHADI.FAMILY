<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELHADI | VIP ACCESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@200;400;700&display=swap');

        :root {
            --gold: #d4af37;
            --gold-light: #f1d592;
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #aa771c);
            --bg-dark: #050505;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        /* --- BACKGROUND ORNAMENT --- */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-video: url('lods.mp4') center/cover no-repeat;
            opacity: 0.5;
            z-index: 1;
        }

        /* --- INTRO ANIMATION --- */
        .main-wrapper {
            animation: luxeEntry 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        @keyframes luxeEntry {
            0% { filter: blur(15px); opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { filter: blur(0); opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-main {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 18px;
            text-transform: uppercase;
            margin-bottom: 15px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        .sub-tag {
            font-size: 0.75rem;
            letter-spacing: 6px;
            color: var(--gold-light);
            opacity: 0.7;
            text-transform: uppercase;
            max-width: 600px;
            line-height: 2;
            margin-bottom: 60px;
            font-weight: 300;
        }

        /* --- PREMIUM BUTTON --- */
        .btn-vip {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 18px 50px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 6px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        .btn-vip::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-vip:hover::before {
            left: 100%;
        }

        .btn-vip:hover {
            background: var(--gold-gradient);
            color: #000;
            box-shadow: 0 0 40px rgba(179, 135, 40, 0.4);
            border-color: transparent;
            transform: translateY(-5px);
        }

        /* --- LOADING OVERLAY --- */
        #loading-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader-ring {
            width: 60px; height: 60px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 2px solid var(--gold);
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .fade-out {
            opacity: 0;
            filter: blur(20px);
            transform: scale(1.1);
            transition: 1s ease-in-out;
        }

        .gold-glow {
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: 30px;
            opacity: 0.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="content">
        <div class="logo-main">ELHADI</div>
        <div class="sub-tag">
            VIP-Premium SERVER.<br>
            hanya orang orang tertentu saja yang bisa mengakses server ini.
        </div>
        
        <button class="btn-vip" onclick="triggerLoading()">Initialize Access</button>
        
        <p class="gold-glow">
            Encrypted VIP Session
        </p>
    </div>

    <div id="loading-screen">
        <div class="loader-ring"></div>
        <div style="letter-spacing: 10px; font-size: 0.7rem; font-weight: 700; color: var(--gold); font-family: 'Cinzel', serif;">
            VERIFYING CREDENTIALS...
        </div>
    </div>

    <script>
        function triggerLoading() {
            // Efek transisi halus pada konten
            document.getElementById('content').classList.add('fade-out');

            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'flex';
                
                setTimeout(() => {
                    // Ganti ke file tujuan Anda
                    window.location.href = "loginVIP.html"; 
                }, 2500); 

            }, 800);
        }
    </script>
</body>
</html>
