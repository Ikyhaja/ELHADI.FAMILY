<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELHADI FAMILY | Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        :root {
            --accent: #00ff88;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        /* LOGO AREA */
        .brand-container {
            text-align: center;
            animation: zoomIn 1.5s ease-out;
        }

        .logo-main {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .logo-main span {
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .version-tag {
            font-size: 0.8rem;
            letter-spacing: 5px;
            opacity: 0.5;
            text-transform: uppercase;
        }

        /* MENU ACTION */
        .action-area {
            margin-top: 100px;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .btn-start {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 50px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-start:hover {
            border-color: var(--accent);
            color: var(--accent);
            letter-spacing: 8px;
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        /* Tekan Tombol Apapun */
        .press-key {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 2px;
            animation: blink 2s infinite;
        }

        /* FOOTER DECORATION */
        .footer-info {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.3;
            text-transform: uppercase;
        }

        /* ANIMATIONS */
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(1.1); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.6; }
        }

        /* Efek Transisi Keluar */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            filter: blur(20px);
            transition: 0.8s;
        }

    </style>
</head>
<body onclick="goToLogin()">

    <div class="brand-container" id="brand">
        <div class="logo-main">CORE<span>.OS</span></div>
        <div class="version-tag">Regional Connectivity Established</div>
    </div>

    <div class="action-area" id="action">
        <button class="btn-start">Mulai</button>
        <div class="press-key">KLIK DI MANA SAJA UNTUK LANJUT</div>
    </div>

    <div class="footer-info">
        <span>Kalsel Regional Hub</span>
        <span>Secure Protocol 4.0</span>
        <span>Lat: -3.3166 | Lon: 114.5901</span>
    </div>

    <script>
        function goToLogin() {
            // Efek transisi halus sebelum pindah halaman
            document.getElementById('brand').classList.add('fade-out');
            document.getElementById('action').classList.add('fade-out');

            setTimeout(() => {
                // Ganti 'login.html' dengan nama file login yang kamu buat tadi
                window.location.href = "login.html"; 
            }, 800);
        }
    </script>
</body>
</html>
