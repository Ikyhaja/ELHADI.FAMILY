<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELHADI CONNECT | Premium Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --u-blue: #0070ff;
            --u-blue-glow: rgba(0, 112, 255, 0.5);
            --dark-bg: #020202;
            --sidebar-width: 80px;
            --glass: rgba(15, 15, 15, 0.8);
        }

        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Video Background */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            padding-left: calc(var(--sidebar-width) + 5%);
        }

        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.4) contrast(1.1);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* Sidebar Nav */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: var(--u-blue);
            margin-bottom: 50px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
        }

        /* Link Wrapper */
        .nav-item {
            text-decoration: none;
            font-size: 1.5rem;
            margin: 15px 0;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            width: 100%;
            text-align: center;
            display: block;
        }

        .nav-item:hover, .nav-item.active {
            color: white;
            text-shadow: 0 0 15px var(--u-blue);
        }

        .nav-item.active::before {
            content: "";
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 4px;
            background: var(--u-blue);
            box-shadow: 0 0 10px var(--u-blue);
        }

        /* Content */
        .content { max-width: 800px; z-index: 10; }

        .badge {
            background: rgba(0, 112, 255, 0.1);
            color: var(--u-blue);
            padding: 6px 16px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            border: 1px solid var(--u-blue);
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2rem;
            margin: 0;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 25px 0 40px 0;
            max-width: 550px;
            line-height: 1.6;
        }

        /* Button Actions */
        .btn-group { display: flex; gap: 20px; }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 18px 40px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-play {
            background: var(--u-blue);
            color: white;
        }

        .btn-play:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 0; left: var(--sidebar-width); right: 0;
            height: 40px;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .status-dot {
            width: 6px; height: 6px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 8px #00ff88;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-logo" onclick="location.href='#'" title="Home"></div>
        <a href="#Home" class="nav-item active" title="Beranda">🏠</a>
        <a href="#Games" class="nav-item" title="Games">🎮</a>
        <a href="#Friends" class="nav-item" title="Teman">👥</a>
        <a href="#Stats" class="nav-item" title="Statistik">🏆</a>
        <div style="flex-grow: 1;"></div>
        <a href="#Settings" class="nav-item" title="Pengaturan">⚙️</a>
    </nav>

    <section class="hero-container">
        <video autoplay muted loop playsinline id="bgVideo">
<source src="gamess.mp4" type="video/mp4">
</video>
        <div class="overlay"></div>

        <div class="content">
            <div class="badge">Session Active</div>
            <h1>ELH4D1 <span style="color: var(--u-blue);">CONNECT</span></h1>
            <p class="tagline">
                Selamat datang kembali di pusat kendali ELH4D1. Akses koleksi aib, database wibu, dan update terbaru keluarga secara real-time.
            </p>
            
            <div class="btn-group">
                <a href="menugame.html" class="btn btn-play" onclick="alert('Memulai akses ke database...')">Mainkan Sekarang</button>
                <a href="https://google.com" target="_blank" class="btn btn-outline">Lihat Detail</a>
            </div>
        </div>
    </section>

    <div class="status-bar">
        <div class="status-dot"></div>
        <span id="status-text">SYSTEM READY | ACCESS GRANTED | </span>
        <span id="clock" style="margin-left: auto;">00:00:00</span>
    </div>

    <script>
        // 1. Logika Navigasi Sidebar (Active State)
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 2. Real-time Clock di Status Bar
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0') + ":" + 
                         now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 3. Simple Button Interaction
        document.querySelector('.btn-play').addEventListener('click', () => {
            console.log("Akses dimulai...");
            // Kamu bisa menambahkan redirect ke halaman lain di sini:
            // window.location.href = "game.html";
        });
    </script>

</body>
</html>
