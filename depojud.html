<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Deposit - Luxe Dragon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dragon-gold: #ffcc00;
            --dragon-red: #ff1100;
            --bg-card: #0a1629;
            --bg-input: #000c1d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020b1a;
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Utama */
        .deposit-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 500px;
            border: 2px solid var(--dragon-gold);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
            position: relative;
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: var(--dragon-gold);
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        /* Group Input */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #8899af;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid #1e3a5f;
            padding: 15px;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--dragon-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        /* Pilihan Metode Pembayaran */
        .payment-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .pay-option {
            background: #000;
            border: 1px solid #1e3a5f;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .pay-option:hover, .pay-option.active {
            border-color: var(--dragon-gold);
            background: rgba(255, 204, 0, 0.1);
        }

        .pay-option img {
            max-width: 100%;
            height: 20px;
            filter: brightness(0) invert(1); /* Membuat logo jadi putih */
        }

        .pay-option span {
            display: block;
            font-size: 10px;
            margin-top: 5px;
            font-weight: bold;
        }

        /* Tombol Cepat (Nominal) */
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .amount-btn {
            background: #1e3a5f;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .amount-btn:active { background: var(--dragon-gold); color: black; }

        /* Button Submit */
        .submit-btn {
            width: 100%;
            background: linear-gradient(180deg, var(--dragon-gold) 0%, #b38b00 100%);
            border: none;
            padding: 18px;
            border-radius: 10px;
            color: black;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 204, 0, 0.4);
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #5d7491;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="deposit-container">
        <h1 class="header-title">ISI SALDO NAGA</h1>

        <div class="form-group">
            <label>Pilih Metode</label>
            <div class="payment-grid">
                <div class="pay-option active" onclick="selectPay(this)">
                    <span>QRIS</span>
                </div>
                <div class="pay-option" onclick="selectPay(this)">
                    <span>BANK</span>
                </div>
                <div class="pay-option" onclick="selectPay(this)">
                    <span>E-WALLET</span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Nominal Deposit (IDR)</label>
            <input type="number" id="nominal" placeholder="Minimal 10.000">
            <div class="quick-amounts">
                <button class="amount-btn" onclick="setAmount(50000)">50.000</button>
                <button class="amount-btn" onclick="setAmount(100000)">100.000</button>
                <button class="amount-btn" onclick="setAmount(500000)">500.000</button>
            </div>
        </div>

        <div class="form-group">
            <label>Ambil Bonus</label>
            <select>
                <option>TANPA BONUS</option>
                <option>NEW MEMBER 100% (X10)</option>
                <option>DEPOSIT HARIAN 10% (X3)</option>
                <option>BONUS PETIR MALAM JUMAT</option>
            </select>
        </div>

        <div class="form-group">
            <label>Keterangan (Opsional)</label>
            <input type="text" placeholder="Masukkan berita transfer">
        </div>

        <button class="submit-btn" onclick="prosesDeposit()">KONFIRMASI DEPOSIT</button>

        <p class="footer-note">
            *Pastikan nama pengirim sesuai dengan nama terdaftar.<br>
            Proses otomatis 1-3 menit.
        </p>
    </div>

    <script>
        function setAmount(val) {
            document.getElementById('nominal').value = val;
        }

        function selectPay(el) {
            document.querySelectorAll('.pay-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function prosesDeposit() {
            const nominal = document.getElementById('nominal').value;
            if(nominal < 10000) {
                alert("Nominal minimal adalah 10.000");
            } else {
                alert("Formulir terkirim! Silahkan lakukan pembayaran sebesar IDR " + parseInt(nominal).toLocaleString('id-ID'));
                // Di sistem asli, ini akan mengarah ke halaman QRIS atau Nomor Rekening
            }
        }
    </script>
</body>
</html>
