<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELHADI | Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        :root {
            --accent: #00ff88;
            --text: #ffffff;
            --error: #ff4d4d;
            --bg-overlay: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('hh.jpeg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* --- LOADING OVERLAY --- */
        #loader-overlay {
            display: none; /* Sembunyi secara default */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- LOGIN CARD --- */
        .login-card {
            position: relative;
            width: 380px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Dekorasi Siku */
        .login-card::before, .login-card::after {
            content: ""; position: absolute; width: 15px; height: 15px; border: 2px solid var(--accent); transition: 0.3s;
        }
        .login-card::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .login-card::after { bottom: 0; right: 0; border-left: none; border-top: none; }

        .brand-name { font-size: 1.8rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 5px; color: var(--text); }
        .brand-name span { color: var(--accent); }
        .sub-text { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 35px; }

        /* INPUT */
        .input-box { margin-bottom: 20px; }
        .input-box input {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            outline: none; color: white; transition: 0.3s;
        }
        .input-box input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        /* BUTTON */
        .btn-login {
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent);
            color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0,255,136,0.3); }

        #msg { font-size: 0.7rem; margin-bottom: 10px; height: 15px; text-transform: uppercase; font-weight: bold; }

        /* SHAKE */
        .shake { animation: shakeAnim 0.4s ease-in-out; border-color: var(--error) !important; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner"></div>
        <div style="letter-spacing: 10px; font-size: 0.8rem; font-weight: 700;">INITIALIZING...</div>
    </div>

    <div class="login-card" id="card">
        <div class="brand-name">ELH4D1<span>.FAMILY</span></div>
        <div class="sub-text">Sistem Akses Regional</div>

        <div id="msg"></div>

        <form onsubmit="event.preventDefault(); handleAuth();">
            <div class="input-box">
                <input type="text" id="user" placeholder="ID PENGGUNA" required autocomplete="off">
            </div>
            <div class="input-box">
                <input type="password" id="pass" placeholder="KATA SANDI" required>
            </div>
            <button type="submit" class="btn-login">Verifikasi Identitas</button>
        </form>

        <div style="margin-top: 30px; font-size: 0.6rem; color: rgba(255,255,255,0.2); letter-spacing: 1px;">
           <a href="gantisandi.html" style="color: rgba(255,255,255,0.2); text-decoration: none;">Butuh Bantuan?</a>
        </div>
    </div>

    <script>
        function handleAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const card = document.getElementById('card');
            const msg = document.getElementById('msg');
            const loader = document.getElementById('loader-overlay');

            // Akun 
            if (u === "ELHADI" && p === "WIBU") {
                msg.style.color = "var(--accent)";
                msg.innerText = "Kredensial Valid.";

                // JALANKAN LOADING
                setTimeout(() => {
                    loader.style.display = "flex"; // Tampilkan loading screen
                    
                    setTimeout(() => {
                        window.location.href = "lobby.html"; // Ganti ke link Anda
                    }, 2000); // Tunggu 2 detik saat loading
                }, 500);

            } else {
                msg.style.color = "var(--error)";
                msg.innerText = "Akses Ditolak: Salah Kredensial";
                
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
                document.getElementById('pass').value = "";
            }
        }
    </script>
</body>
</html>
