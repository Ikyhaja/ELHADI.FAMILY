<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRILLER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container Utama */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Konten di kiri ala Ubisoft */
            color: white;
        }

        /* Video Background */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Overlay Gelap agar Teks Terbaca */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.7) 100%);
            z-index: 0;
        }

        /* Konten Menu */
        .content {
            position: relative;
            z-index: 1;
            padding-left: 10%;
            max-width: 600px;
        }

        .game-logo {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .tagline {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        /* Tombol */
        .cta-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 2px solid white;
            letter-spacing: 2px;
        }

        .btn-primary {
            background-color: white;
            color: black;
        }

        .btn-primary:hover {
            background-color: transparent;
            color: white;
        }

        .btn-secondary {
            background-color: transparent;
            color: white;
        }

        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.1);
        }

        /* Navigasi Samping (Opsional) */
        .side-nav {
            position: absolute;
            right: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .nav-item:hover {
            opacity: 1;
        }

        /* Responsif Mobile */
        @media (max-width: 768px) {
            .content { padding-left: 5%; text-align: center; }
            .cta-container { flex-direction: column; align-items: center; }
            .game-logo { font-size: 2.5rem; }
            .side-nav { display: none; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="latifwibu.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="overlay"></div>

        <div class="content">
            <h1 class="game-logo">Ubisoft<br>Adventures</h1>
            <p class="tagline">Jelajahi dunia tanpa batas dengan kualitas grafis generasi terbaru. Siapkan diri Anda untuk pertempuran epik.</p>
            
            <div class="cta-container">
                <a href="#" class="btn btn-primary">Pre-Order Now</a>
                <a href="#" class="btn btn-secondary">Watch Trailer</a>
            </div>
        </div>

        <nav class="side-nav">
            <a href="#" class="nav-item">News</a>
            <a href="#" class="nav-item">Games</a>
            <a href="#" class="nav-item">Store</a>
            <a href="#" class="nav-item">Support</a>
        </nav>
    </section>

    <script>
        // Efek Parallax Sederhana pada Gerakan Mouse
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX * -0.01);
            const moveY = (e.clientY * -0.01);
            document.querySelector('.video-bg').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
        });
    </script>

</body>
</html>
