<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Slot - Neon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --block-red: #ff4d4d;
            --block-blue: #33ccff;
            --block-green: #2ecc71;
            --block-yellow: #f1c40f;
            --block-purple: #9b59b6;
            --block-orange: #e67e22;
            --neon-glow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            background: var(--bg-color); color: white; font-family: 'Outfit', sans-serif;
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- HEADER (Multiplier Bar) --- */
        .multiplier-container {
            padding: 15px; display: flex; justify-content: center; gap: 10px;
            background: rgba(0,0,0,0.3);
        }
        .m-pill {
            padding: 8px 20px; border-radius: 20px; background: #1e293b;
            font-weight: 900; color: #475569; transition: 0.3s; font-size: 18px;
        }
        .m-pill.active {
            background: #fff; color: #000; transform: scale(1.1);
            box-shadow: 0 0 20px #fff;
        }

        /* --- GAME BOARD --- */
        .game-canvas {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; perspective: 1000px;
        }

        .grid-frame {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            width: 92%; max-width: 400px; padding: 12px;
            background: #1e293b; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- BLOCK STYLE --- */
        .block {
            aspect-ratio: 1/1; border-radius: 8px; position: relative;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 -4px rgba(0,0,0,0.2);
            animation: blockPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes blockPop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .block::after { /* Efek Glossy di atas ubin */
            content: ''; position: absolute; top: 10%; left: 10%;
            width: 30%; height: 20%; background: rgba(255,255,255,0.3);
            border-radius: 20px;
        }

        .block.explode { animation: blockExplode 0.3s forwards; }
        @keyframes blockExplode {
            to { transform: scale(1.5); opacity: 0; filter: brightness(2); }
        }

        /* --- WIN OVERLAY (Block Blast Style) --- */
        #winIntro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; flex-direction: column;
            justify-content: center; align-items: center; background: rgba(15, 23, 42, 0.9);
        }
        .win-card {
            background: #fff; color: #000; padding: 30px; border-radius: 30px;
            text-align: center; transform: scale(0); transition: 0.5s;
        }
        .win-card.show { transform: scale(1); }
        .win-card h1 { font-size: 40px; margin-bottom: 10px; }

        /* --- FOOTER CONTROLS --- */
        .footer {
            padding: 20px; background: #1e293b;
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center;
            border-radius: 30px 30px 0 0;
        }

        .btn-spin {
            width: 80px; height: 80px; border-radius: 25px; border: none;
            background: #3b82f6; color: white; font-weight: 900; font-size: 18px;
            box-shadow: 0 6px 0 #1d4ed8; cursor: pointer; transition: 0.1s;
        }
        .btn-spin:active { transform: translateY(4px); box-shadow: 0 2px 0 #1d4ed8; }
        .btn-spin.spinning { background: #64748b; box-shadow: 0 6px 0 #475569; }

        .stat-label { font-size: 12px; color: #94a3b8; display: block; }
        .stat-val { font-size: 18px; font-weight: 900; }

        /* Color Classes */
        .c1 { background-color: var(--block-red); }
        .c2 { background-color: var(--block-blue); }
        .c3 { background-color: var(--block-green); }
        .c4 { background-color: var(--block-yellow); }
        .c5 { background-color: var(--block-purple); }
        .c6 { background-color: var(--block-orange); }

        .flash { animation: flashEffect 0.2s; }
        @keyframes flashEffect { 0% { background: #fff; } 100% { background: var(--bg-color); } }
    </style>
</head>
<body id="mainBody">

    <div class="multiplier-container">
        <div class="m-pill active" id="m1">x1</div>
        <div class="m-pill" id="m2">x2</div>
        <div class="m-pill" id="m3">x4</div>
        <div class="m-pill" id="m10">x10</div>
    </div>

    <div class="game-canvas">
        <div id="winIntro">
            <div class="win-card" id="winCard">
                <p style="color: #3b82f6; font-weight: 900;">AMAZING!</p>
                <h1 id="winTitle">COMBO BLAST</h1>
                <h2 id="winAmount" style="font-size: 30px;">0</h2>
            </div>
        </div>
        <div class="grid-frame" id="grid"></div>
    </div>

    <div class="footer">
        <div style="text-align: center;">
            <span class="stat-label">BET</span>
            <b class="stat-val" id="betVal">10,000</b>
            <div style="margin-top: 10px;">
                <button onclick="changeBet(-2000)" style="padding:5px 10px; border-radius:8px; border:none;">-</button>
                <button onclick="changeBet(2000)" style="padding:5px 10px; border-radius:8px; border:none;">+</button>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn-spin" id="spinBtn" onclick="handleSpin()">GO</button>
            <div style="margin-top:10px; font-size:12px; font-weight:900;">
                <input type="checkbox" id="autoMode"> AUTO
            </div>
        </div>

        <div style="text-align: center;">
            <span class="stat-label">CREDITS</span>
            <b class="stat-val" id="balVal">1,000,000</b>
            <div style="color:#2ecc71; font-size: 14px; margin-top:10px;">
                +<span id="winVal">0</span>
            </div>
        </div>
    </div>

    <script>
        const COLORS = ["c1", "c2", "c3", "c4", "c5", "c6"];
        let balance = 1000000;
        let bet = 10000;
        let combo = 1;
        let running = false;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<20; i++) spawnBlock();
        }

        function spawnBlock() {
            const div = document.createElement('div');
            div.className = 'block ' + COLORS[Math.floor(Math.random() * COLORS.length)];
            document.getElementById('grid').appendChild(div);
        }

        function changeBet(v) { if(!running) { bet = Math.max(2000, bet + v); document.getElementById('betVal').innerText = bet.toLocaleString(); } }

        function handleSpin() { if(!running) start(); }

        async function start() {
            if(balance < bet) return alert("Saldo Habis!");
            running = true; balance -= bet; combo = 1;
            document.getElementById('balVal').innerText = balance.toLocaleString();
            document.getElementById('spinBtn').classList.add('spinning');
            
            document.getElementById('grid').innerHTML = '';
            for(let i=0; i<20; i++) spawnBlock();
            
            setTimeout(processCascading, 500);
        }

        function processCascading() {
            const isWin = Math.random() > 0.6;
            
            if(isWin) {
                const blocks = document.querySelectorAll('.block');
                const winCount = Math.floor(Math.random() * 6) + 4;
                
                // Visual Flash
                document.getElementById('mainBody').classList.add('flash');
                setTimeout(() => document.getElementById('mainBody').classList.remove('flash'), 200);

                for(let i=0; i<winCount; i++) {
                    blocks[Math.floor(Math.random() * blocks.length)].classList.add('explode');
                }

                setTimeout(() => {
                    const winAmount = bet * combo * 2;
                    balance += winAmount;
                    
                    if(combo >= 3) triggerWinIntro(winAmount);

                    document.getElementById('winVal').innerText = winAmount.toLocaleString();
                    document.querySelectorAll('.explode').forEach(e => e.remove());
                    for(let i=0; i<winCount; i++) spawnBlock();

                    updateMultiplier();
                    document.getElementById('balVal').innerText = balance.toLocaleString();
                    setTimeout(processCascading, 600);
                }, 300);
            } else {
                running = false;
                document.getElementById('spinBtn').classList.remove('spinning');
                resetM();
                if(document.getElementById('autoMode').checked) setTimeout(start, 1000);
            }
        }

        function triggerWinIntro(amt) {
            const intro = document.getElementById('winIntro');
            const card = document.getElementById('winCard');
            const amtTxt = document.getElementById('winAmount');
            
            amtTxt.innerText = amt.toLocaleString();
            intro.style.display = 'flex';
            setTimeout(() => card.classList.add('show'), 10);
            
            setTimeout(() => {
                card.classList.remove('show');
                setTimeout(() => intro.style.display = 'none', 500);
            }, 2000);
        }

        function updateMultiplier() {
            const pills = document.querySelectorAll('.m-pill');
            pills.forEach(p => p.classList.remove('active'));
            
            if(combo === 1) { combo = 2; document.getElementById('m2').classList.add('active'); }
            else if(combo === 2) { combo = 4; document.getElementById('m3').classList.add('active'); }
            else { combo = 10; document.getElementById('m10').classList.add('active'); }
        }

        function resetM() {
            document.querySelectorAll('.m-pill').forEach(p => p.classList.remove('active'));
            document.getElementById('m1').classList.add('active');
        }

        init();
    </script>
</body>
</html>
