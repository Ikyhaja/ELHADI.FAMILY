<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Block</title>
    <style>
        /* Menggunakan font sistem yang bersih atau font pixel jika ada */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c3e50;
            font-family: 'Press Start 2P', cursive; /* Gaya font Pixel */
        }

        /* Latar Belakang Animasi Awan */
        .bg-wrapper {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            z-index: -1;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 20px;
            opacity: 0.8;
            animation: moveClouds linear infinite;
        }

        @keyframes moveClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        /* Container Utama */
        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        /* Judul Game */
        .game-title {
            margin-bottom: 60px;
            animation: float 3s ease-in-out infinite;
        }

        .game-title h1 {
            color: #ffffff;
            font-size: 32px;
            margin: 0;
            text-shadow: 6px 6px 0px #2980b9;
            letter-spacing: 2px;
        }

        .game-title span {
            color: #f1c40f;
            font-size: 14px;
            display: block;
            margin-top: 10px;
            text-shadow: 2px 2px 0px #d35400;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Grup Tombol */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 300px;
        }

        .menu-btn {
            position: relative;
            padding: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            border: none;
            cursor: pointer;
            color: white;
            background: #e67e22;
            box-shadow: 0 8px 0 #d35400, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.1s;
            border-radius: 8px;
        }

        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #d35400, 0 8px 10px rgba(0,0,0,0.2);
        }

        .btn-play { background: #27ae60; box-shadow: 0 8px 0 #219150; }
        .btn-play:active { box-shadow: 0 4px 0 #219150; }

        .btn-settings { background: #2980b9; box-shadow: 0 8px 0 #1f6391; }
        .btn-settings:active { box-shadow: 0 4px 0 #1f6391; }

        .btn-quit { background: #c0392b; box-shadow: 0 8px 0 #a93226; }
        .btn-quit:active { box-shadow: 0 4px 0 #a93226; }

        /* Versi Info */
        .version-tag {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: white;
            font-size: 8px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="bg-wrapper" id="bg">
        </div>

    <div class="menu-container">
        <div class="game-title">
            <h1>PIXEL BLOCK</h1>
            <span>MOBILE & PC ADVENTURE</span>
        </div>

        <div class="button-group">
            <a href="gamesandroid.html" class="menu-btn btn-play" onclick="handleClick('Mulai Permainan')">START GAME HP</a>
            <a href="gamespc.html" class="menu-btn btn-settings" onclick="handleClick('Mulai Permainan')">START GAME PC</a>
            <button class="menu-btn" onclick="handleClick('Karakter')">CHARACTER</button>
            <a href="connect.html" class="menu-btn btn-quit" onclick="window.close()">QUIT</a>
        </div>
    </div>

    <div class="version-tag">v1.0.0-beta</div>

    <script>
        // Animasi Awan Sederhana
        const bg = document.getElementById('bg');
        function createCloud() {
            const cloud = document.createElement('div');
            cloud.classList.add('cloud');
            
            const sizeW = Math.random() * 100 + 50;
            const sizeH = sizeW * 0.4;
            
            cloud.style.width = sizeW + 'px';
            cloud.style.height = sizeH + 'px';
            cloud.style.top = Math.random() * 60 + '%';
            cloud.style.left = '-200px';
            
            const duration = Math.random() * 20 + 10;
            cloud.style.animationDuration = duration + 's';
            
            bg.appendChild(cloud);
            
            setTimeout(() => {
                cloud.remove();
            }, duration * 1000);
        }

        setInterval(createCloud, 3000);
        for(let i=0; i<5; i++) createCloud(); // Spawn awal

        function handleClick(action) {
            // Berikan efek haptic/getar jika di Android
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
            alert("Aksi: " + action);
        }
    </script>
</body>
</html>
