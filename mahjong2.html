<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahjong Ways 2 - Premium God Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
    <style>

/* --- JACKPOT ANIMATION EFFECTS --- */
#jackpotOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(255,204,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
    z-index: 99; display: none; flex-direction: column; 
    justify-content: center; align-items: center; pointer-events: none;
}

.gold-rain {
    position: absolute; width: 100%; height: 100%;
    background-image: url('https://www.transparenttextures.com/patterns/dust.png');
    animation: goldShift 2s linear infinite;
}

@keyframes goldShift {
    from { background-position: 0 0; }
    to { background-position: 0 1000px; }
}

.jackpot-text {
    font-family: 'Orbitron'; font-size: 60px; font-weight: 900;
    color: var(--gold); text-shadow: 0 0 30px #fff, 0 0 50px var(--gold);
    animation: zoomPulse 0.5s ease-in-out infinite alternate;
}

@keyframes zoomPulse {
    from { transform: scale(1); filter: brightness(1); }
    to { transform: scale(1.2); filter: brightness(1.5); }
}

/* Efek Guncangan Lebih Kuat untuk Scatter/Jackpot */
.jackpot-shake { animation: extremeShake 0.1s infinite; }
@keyframes extremeShake {
    0% { transform: translate(5px, 5px) rotate(1deg); }
    50% { transform: translate(-5px, -5px) rotate(-1deg); }
    100% { transform: translate(5px, -5px) rotate(0deg); }
}

        :root {
            --jade-light: #00ffaa;
            --jade-dark: #004d33;
            --gold: #ffcc00;
            --wild-red: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- MULTIPLIER BAR (Header) --- */
        .header-bar {
            background: linear-gradient(180deg, #111, #000);
            padding: 15px; border-bottom: 2px solid var(--jade-dark);
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }
        .m-box {
            text-align: center; font-family: 'Orbitron'; font-size: 20px;
            color: #222; border: 1.5px solid #1a1a1a; border-radius: 6px;
            padding: 5px; transition: all 0.4s;
        }
        .m-box.active {
            color: var(--gold); border-color: var(--gold);
            background: rgba(255, 204, 0, 0.1); transform: scale(1.15);
            text-shadow: 0 0 10px var(--gold); box-shadow: 0 0 15px rgba(255,204,0,0.2);
        }

        /* --- GAME ENGINE (Center) --- */
        .game-canvas {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #024a30 0%, #000 100%);
            position: relative; overflow: hidden;
        }

        .slot-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
            width: 96%; max-width: 500px; padding: 12px;
            background: rgba(0,0,0,0.8); border: 2px solid var(--jade-dark);
            border-radius: 12px; position: relative; z-index: 2;
        }

        /* --- TILE STYLING (3D Effect) --- */
        .tile {
            aspect-ratio: 3/4; background: #fff; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(24px, 7vw, 42px); color: #1d1d1d;
            font-family: 'Noto Sans SC'; position: relative;
            /* Efek 3D Mahjong */
            border-left: 4px solid #00a86b;
            border-bottom: 6px solid #d1d1d1;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
            animation: tileDrop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes tileDrop {
            0% { transform: translateY(-500px) rotateX(45deg); opacity: 0; }
            100% { transform: translateY(0) rotateX(0); opacity: 1; }
        }

        .tile.gold-tile {
            background: linear-gradient(145deg, #ffeb3b, #fbc02d);
            border-left: 4px solid #ff9800; border-bottom: 6px solid #e65100;
        }

        .tile.wild-tile {
            background: radial-gradient(circle, #ff5f5f, #7a0000);
            color: var(--gold); border-left: 4px solid #4a0000;
            border-bottom: 6px solid #330000; font-size: 20px;
        }

        .tile.explode { animation: explodeEffect 0.4s forwards; }
        @keyframes explodeEffect {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(3); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* --- BIG WIN OVERLAY --- */
        #winPopup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 100; text-align: center; pointer-events: none; transition: 0.5s;
        }
        #winPopup.show { transform: translate(-50%, -50%) scale(1.5); }
        .win-text { font-family: 'Orbitron'; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px #ff0000; font-size: 40px; }

        /* --- CONTROL PANEL (Footer) --- */
        .footer-panel {
            background: #000; border-top: 3px solid var(--jade-dark);
            padding: 15px; display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center;
        }

        .stat-group { text-align: center; }
        .stat-group p { font-size: 10px; color: var(--jade-light); letter-spacing: 1px; margin-bottom: 3px; }
        .stat-group b { font-family: 'Orbitron'; font-size: 14px; color: #fff; }

        .spin-btn-main {
            width: 85px; height: 85px; border-radius: 50%; border: 4px solid var(--gold);
            background: radial-gradient(circle, #008f5d, #002e1e);
            box-shadow: 0 0 20px rgba(0,255,170,0.3); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0 auto; transition: 0.2s;
        }
        .spin-btn-main:active { transform: scale(0.9); }
        .spin-btn-main b { font-family: 'Orbitron'; font-size: 18px; color: #fff; }
        .spin-btn-main.auto-active { animation: glowPulse 1.5s infinite; }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px var(--gold); }
            50% { box-shadow: 0 0 25px var(--gold); }
            100% { box-shadow: 0 0 5px var(--gold); }
        }

        .bet-adjuster { display: flex; gap: 5px; justify-content: center; margin-top: 5px; }
        .btn-mini { background: #222; border: 1px solid #444; color: #fff; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; }

        .shaking { animation: ultraShake 0.2s infinite; }
        @keyframes ultraShake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-3px, -2px); }
            100% { transform: translate(1px, 2px); }
        }
    </style>
</head>
<body id="gameBody">

    <div class="header-bar">
        <div class="m-box active" id="m1">x1</div>
        <div class="m-box" id="m2">x2</div>
        <div class="m-box" id="m3">x3</div>
        <div class="m-box" id="m5">x5</div>
    </div>

    <div class="game-canvas">
        <div id="jackpotOverlay">
    <div class="gold-rain"></div>
    <div class="jackpot-text">SCATTER!</div>
    <div class="win-text" style="font-size: 50px;">SUPER WIN</div>
</div>
        <div id="winPopup">
            <div class="win-text">BIG WIN!</div>
        </div>
        <div class="slot-grid" id="grid">
            </div>
    </div>

    <div class="footer-panel">
        <div class="stat-group">
            <p>TARUHAN</p>
            <b id="betDisplay">10.000</b>
            <div class="bet-adjuster">
                <button class="btn-mini" onclick="changeBet(-2000)">-</button>
                <button class="btn-mini" onclick="changeBet(2000)">+</button>
            </div>
        </div>

        <div class="stat-group">
            <button class="spin-btn-main" id="spinBtn" onclick="handleSpin()">
                <b>SPIN</b>
                <span style="font-size: 8px; color: var(--gold);">AUTO</span>
            </button>
            <div style="margin-top: 5px;">
                <input type="checkbox" id="autoCheck"> <span style="font-size: 10px; color: var(--gold);">AUTO SPIN</span>
            </div>
        </div>

        <div class="stat-group">
            <p>SALDO</p>
            <b id="balDisplay">1.000.000</b>
            <div style="color: var(--gold); font-size: 12px; font-weight: bold; margin-top: 10px;">
                WIN: <span id="winDisplay">0</span>
            </div>
        </div>
    </div>

    <script>
        const TILES = ["🀇", "🀈", "🀉", "🀊", "🀋", "🀌", "🀅", "🀆", "🀄"];
        let balance = 1000000;
        let currentBet = 10000;
        let comboMultiplier = 1;
        let isRunning = false;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<20; i++) spawnTile(true);
        }

        function spawnTile(isInitial = false) {
            const grid = document.getElementById('grid');
            const div = document.createElement('div');
            div.className = 'tile';
            
            // Random chance for Gold Tile (15%)
            if(Math.random() > 0.85) div.classList.add('gold-tile');
            
            div.innerText = TILES[Math.floor(Math.random() * TILES.length)];
            grid.appendChild(div);
        }

        function changeBet(amount) {
            if(isRunning) return;
            currentBet = Math.max(2000, currentBet + amount);
            document.getElementById('betDisplay').innerText = currentBet.toLocaleString('id-ID');
        }

        function handleSpin() {
            if(isRunning) return;
            startSequence();
        }

        async function startSequence() {
            if(balance < currentBet) return alert("Saldo Habis!");

            isRunning = true;
            balance -= currentBet;
            comboMultiplier = 1;
            updateUI();
            resetMultiplierUI();

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<20; i++) spawnTile();

            setTimeout(processCascading, 600);
        }

        function processCascading() {
            const tiles = document.querySelectorAll('.tile');
            const winChance = Math.random() > 0.65; // 35% win rate per cascade

            if(winChance) {
                const winCount = Math.floor(Math.random() * 5) + 3;
                const body = document.getElementById('gameBody');
                
                if(comboMultiplier >= 3) body.classList.add('shaking');

                // Pick random winning tiles
                for(let i=0; i<winCount; i++) {
                    const idx = Math.floor(Math.random() * tiles.length);
                    const t = tiles[idx];
                    
                    // Logic: If Gold Tile explodes, it becomes WILD next round (simulated)
                    if(t.classList.contains('gold-tile')) {
                        t.innerText = "WILD";
                        t.classList.add('wild-tile');
                    } else {
                        t.classList.add('explode');
                    }
                }

                setTimeout(() => {
                    body.classList.remove('shaking');
                    const winAmount = currentBet * comboMultiplier * 2.5;
                    balance += winAmount;
                    
if(comboMultiplier >= 5) {
    // Ambil elemen
    const pop = document.getElementById('winPopup');
    const jack = document.getElementById('jackpotOverlay');
    const body = document.getElementById('gameBody');

    // Aktifkan Animasi Jackpot
    jack.style.display = 'flex';
    body.classList.add('jackpot-shake');
    
    // Aktifkan Popup Big Win
    pop.classList.add('show');

    setTimeout(() => {
        pop.classList.remove('show');
        jack.style.display = 'none';
        body.classList.remove('jackpot-shake');
    }, 2500); // Durasi animasi lebih lama agar terasa "Jackpot"-nya
}
                    document.getElementById('winDisplay').innerText = winAmount.toLocaleString('id-ID');
                    
                    // Remove and Replenish
                    document.querySelectorAll('.explode').forEach(e => e.remove());
                    const remaining = document.querySelectorAll('.tile').length;
                    for(let i=0; i < (20 - remaining); i++) spawnTile();

                    incrementMultiplier();
                    updateUI();
                    
                    setTimeout(processCascading, 800);
                }, 400);
            } else {
                isRunning = false;
                updateUI();
                if(document.getElementById('autoCheck').checked) {
                    setTimeout(startSequence, 1200);
                }
            }
        }

        function incrementMultiplier() {
            if(comboMultiplier === 1) comboMultiplier = 2;
            else if(comboMultiplier === 2) comboMultiplier = 3;
            else comboMultiplier = 5;
            
            document.querySelectorAll('.m-box').forEach(b => b.classList.remove('active'));
            document.getElementById('m' + comboMultiplier).classList.add('active');
        }

        function resetMultiplierUI() {
            document.querySelectorAll('.m-box').forEach(b => b.classList.remove('active'));
            document.getElementById('m1').classList.add('active');
            document.getElementById('winDisplay').innerText = "0";
        }

        function updateUI() {
            document.getElementById('balDisplay').innerText = balance.toLocaleString('id-ID');
            const btn = document.getElementById('spinBtn');
            if(isRunning) btn.classList.add('auto-active');
            else btn.classList.remove('auto-active');
        }

        init();
    </script>
</body>
</html>
